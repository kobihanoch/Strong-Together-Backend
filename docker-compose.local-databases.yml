name: strong-together-local-databases

services:
  postgres_dev:
    image: postgres:16
    container_name: strongtogether_postgres_dev
    profiles: ['dev']
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strongtogether_dev
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d strongtogether_dev']
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - pg_dev_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16
    container_name: strongtogether_postgres_test
    profiles: ['test']
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strongtogether_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d strongtogether_test']
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pg_dev_data:
