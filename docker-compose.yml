services:
  main-server:
    build:
      context: .
      dockerfile: src/Dockerfile
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: ["node", "--watch", "src/index.js"]
  background-workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: ["node", "--watch", "workers/globalWorker.js"]
  python-service:
    build:
      context: .
      dockerfile: pythonService/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DISABLE_DEBUG_WINDOW: "1"
    volumes:
      - ./pythonService/main.py:/app/main.py
      - ./pythonService/routes:/app/routes
      - ./pythonService/services:/app/services
      - ./pythonService/analyzers:/app/analyzers
      - ./pythonService/utils:/app/utils
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/routes",
        "--reload-dir",
        "/app/services",
        "--reload-dir",
        "/app/analyzers",
        "--reload-dir",
        "/app/utils",
      ]
