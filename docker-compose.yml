services:
  postgres_dev:
    image: postgres:16
    container_name: strongtogether_postgres_dev
    profiles: ['dev']
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strongtogether_dev
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d strongtogether_dev']
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    networks:
      - strong_together_shared

  postgres_test:
    image: postgres:16
    container_name: strongtogether_postgres_test
    profiles: ['test']
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strongtogether_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d strongtogether_test']
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - strong_together_shared

  main-server:
    build:
      context: .
      dockerfile: src/Dockerfile
    env_file:
      - .env.${NODE_ENV}
    environment:
      NODE_ENV: ${NODE_ENV}
    ports:
      - '5000:5000'
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - strong_together_shared
    command: ['sh', '-c', 'npm ci && npm run start:server:watch']
  background-workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file:
      - .env.${NODE_ENV}
    environment:
      NODE_ENV: ${NODE_ENV}
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - strong_together_shared
    command: ['sh', '-c', 'npm ci && npm run start:workers:watch']
  python-service:
    build:
      context: .
      dockerfile: pythonService/Dockerfile
    env_file:
      - .env.${NODE_ENV}
    environment:
      NODE_ENV: ${NODE_ENV}
      ENABLE_DEBUG_WINDOW: '0'
    volumes:
      - ./pythonService/main.py:/app/main.py
      - ./pythonService/config:/app/config
      - ./pythonService/publishers:/app/publishers
      - ./pythonService/services:/app/services
      - ./pythonService/analyzers:/app/analyzers
      - ./pythonService/aws:/app/aws
      - ./pythonService/utils:/app/utils
    networks:
      - strong_together_shared
    command: ['python', 'main.py']

volumes:
  pg_dev_data:

networks:
  strong_together_shared:
    name: strong-together-shared
