name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create test env file
        shell: bash
        run: |
          cat <<'EOF' > .env.test
          ${{ secrets.ENV_TEST_FILE }}
          EOF

      - name: Run test suite
        run: npm run test:all
