name: Staging Prerelease

on:
  push:
    branches:
      - staging

permissions:
  contents: write

concurrency:
  group: staging-prerelease
  cancel-in-progress: false

jobs:
  prerelease:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore(release):') && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create rc prerelease commit and tag
        run: 'npx standard-version@9.5.0 --prerelease rc -m "chore(release): %s [skip ci]"'

      - name: Push prerelease commit and tags
        run: git push origin HEAD:staging --follow-tags
