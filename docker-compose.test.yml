name: strong-together-test
services:
  # Postgres database - test
  postgres_test:
    image: postgres:16
    container_name: strongtogether_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strongtogether_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d strongtogether_test']
      interval: 3s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - strong_together_shared

  # Redis cache/pubsub - test
  redis_test:
    image: redis:7-alpine
    container_name: strongtogether_redis_test
    restart: unless-stopped
    ports:
      - '6380:6379'
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data
    networks:
      - strong_together_shared

  # Redis UI - test
  redis-insight_test:
    image: redis/redisinsight:latest
    container_name: strongtogether_redisinsight_test
    restart: unless-stopped
    ports:
      - '5541:5540'
    depends_on:
      redis_test:
        condition: service_healthy
    tmpfs:
      - /data
    networks:
      - strong_together_shared

  # Local AWS emulator - test
  localstack_test:
    image: localstack/localstack:4.14.0
    container_name: strongtogether_localstack_test
    restart: unless-stopped
    environment:
      SERVICES: s3,sqs
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET_NAME: strong-together-videos-test
    ports:
      - '4567:4566'
    volumes:
      - ./scripts/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    tmpfs:
      - /var/lib/localstack
    networks:
      - strong_together_shared

  # Mail capture server - test only
  maildev_test:
    image: maildev/maildev:2.1.0
    container_name: strongtogether_maildev_test
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '1080:1080'
    networks:
      - strong_together_shared

  # Atlas container to run Atlas migrations
  atlas:
    image: arigaio/atlas:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    networks:
      - strong_together_shared

networks:
  strong_together_shared:
    name: strong-together-shared
