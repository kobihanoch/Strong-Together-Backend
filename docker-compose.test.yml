services:
  postgres_test:
    image: postgres:16
    container_name: strongtogether_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strongtogether_test
    ports:
      - '5433:5432'
    volumes:
      - pg_test_data:/var/lib/postgresql/data

volumes:
  pg_test_data:
